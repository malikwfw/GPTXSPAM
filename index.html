<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GPT X SPAM | ULTIMATE EDITION</title>
<style>
    /* === CORE VARIABLES & RESET === */
    :root{
        --bg:#050505;
        --blood:#8a0303;
        --blood-glow:rgba(138,3,3,0.6);
        --blood-bright:#ff0000;
        --text:#e0e0e0;
        --code-bg:#0a0a0f;
        --border:rgba(138,3,3,0.4);
        --font-mono:'Courier New',monospace;
        --font-ui:system-ui,sans-serif
    }
    *{margin:0;padding:0;box-sizing:border-box;outline:none;-webkit-tap-highlight-color:transparent}
    @keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(-2px,-2px)}60%{transform:translate(2px,2px)}80%{transform:translate(2px,-2px)}100%{transform:translate(0)}}
    @keyframes scan{0%{top:-100%}100%{top:100%}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
    @keyframes spin{100%{transform:rotate(360deg)}}
    @keyframes drip{0%{transform:translateY(-20px);opacity:0}10%{opacity:1}100%{transform:translateY(100vh);opacity:0}}
    @keyframes matrixFall{0%{transform:translateY(-100%);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(100vh);opacity:0}}
    
    body{
        font-family:var(--font-ui);
        background:var(--bg);
        color:var(--text);
        height:100dvh;
        overflow:hidden;
        direction:ltr; /* Keep layout LTR for code, content handles RTL */
        text-align:left
    }
    
    /* === HACKER VISUAL EFFECTS === */
    .scanline{
        position:fixed;inset:0;pointer-events:none;z-index:9999;
        background:linear-gradient(to bottom,transparent 50%,rgba(138,3,3,0.05) 51%);
        background-size:100% 4px;animation:scan 8s linear infinite
    }
    .matrix-bg{
        position:fixed;inset:0;z-index:-1;overflow:hidden;opacity:0.15
    }
    .matrix-col{
        position:absolute;top:-100%;font-family:var(--font-mono);
        font-size:12px;color:var(--blood);writing-mode:vertical-rl;
        animation:matrixFall linear infinite;white-space:nowrap;user-select:none
    }
    .blood-drip{
        position:fixed;top:-20px;width:1px;height:30px;
        background:linear-gradient(to bottom,transparent,var(--blood),transparent);
        animation:drip linear infinite;opacity:0.3;z-index:-1;pointer-events:none
    }
    
    /* === AUTH SYSTEM === */
    .auth-overlay{
        position:fixed;inset:0;background:var(--bg);z-index:10000;
        display:flex;align-items:center;justify-content:center;overflow:hidden
    }
    .auth-box{
        position:relative;z-index:10;width:95%;max-width:400px;
        padding:30px;background:rgba(10,0,0,0.95);
        border:1px solid var(--blood);border-radius:8px;
        box-shadow:0 0 30px var(--blood-glow),inset 0 0 20px rgba(0,0,0,0.8);
        animation:pulse 4s infinite
    }
    .auth-title{
        font-family:var(--font-mono);font-size:24px;font-weight:900;
        color:var(--blood-bright);text-align:center;letter-spacing:4px;
        text-transform:uppercase;animation:glitch 3s infinite;text-shadow:2px 0 var(--blood),-2px 0 #fff
    }
    .auth-sub{
        font-size:10px;color:#555;text-align:center;margin:10px 0 25px;
        font-family:var(--font-mono);letter-spacing:2px
    }
    .auth-input{
        width:100%;padding:12px;margin-bottom:12px;
        background:rgba(0,0,0,0.6);border:1px solid var(--border);
        border-radius:4px;color:#fff;font-family:var(--font-mono);
        font-size:13px;transition:0.3s
    }
    .auth-input:focus{border-color:var(--blood-bright);box-shadow:0 0 15px var(--blood-glow)}
    .auth-btn{
        width:100%;padding:12px;background:linear-gradient(135deg,var(--blood),#500);
        border:1px solid var(--blood-bright);border-radius:4px;
        color:#fff;font-family:var(--font-mono);font-weight:700;
        font-size:12px;letter-spacing:2px;cursor:pointer;
        text-transform:uppercase;transition:0.3s
    }
    .auth-btn:hover{background:var(--blood-bright);box-shadow:0 0 25px var(--blood-glow)}
    .auth-error{color:#ff4444;font-size:11px;text-align:center;margin-top:10px;font-family:var(--font-mono)}
    
    /* === MAIN APP LAYOUT === */
    .app{display:flex;flex-direction:column;height:100%}
    
    /* Header */
    .header{
        flex-shrink:0;padding:10px 15px;display:flex;align-items:center;gap:12px;
        border-bottom:1px solid var(--border);background:rgba(5,0,0,0.98)
    }
    .logo{
        width:32px;height:32px;border-radius:50%;border:2px solid var(--blood);
        overflow:hidden;box-shadow:0 0 15px var(--blood-glow)
    }
    .logo img{width:100%;height:100%;object-fit:cover}
    .title{
        font-family:var(--font-mono);font-size:18px;font-weight:900;
        color:var(--blood-bright);text-shadow:0 0 10px var(--blood-glow);
        letter-spacing:2px
    }
    .header-btn{
        width:32px;height:32px;border:1px solid var(--border);
        background:rgba(138,3,3,0.1);border-radius:4px;color:var(--blood);
        cursor:pointer;display:flex;align-items:center;justify-content:center;
        font-family:var(--font-mono);font-size:14px;transition:0.3s
    }
    .header-btn:hover{background:var(--blood);color:#fff;box-shadow:0 0 15px var(--blood-glow)}
    
    /* Chat Area */
    .chat{
        flex:1;overflow-y:auto;padding:15px;padding-bottom:200px;
        scroll-behavior:smooth
    }
    .welcome{
        min-height:100%;display:flex;flex-direction:column;
        align-items:center;justify-content:center;text-align:center;padding:20px
    }
    .wel-logo{
        width:70px;height:70px;border-radius:50%;border:3px solid var(--blood);
        margin-bottom:20px;box-shadow:0 0 40px var(--blood-glow);animation:pulse 2s infinite
    }
    .wel-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .welcome h1{
        font-family:var(--font-mono);font-size:24px;color:var(--blood-bright);
        margin-bottom:10px;letter-spacing:3px;text-shadow:0 0 20px var(--blood-glow)
    }
    .welcome p{color:#666;font-size:13px;font-family:var(--font-mono);margin-bottom:25px}
    
    /* Messages */
    .msg{
        margin-bottom:15px;padding:15px;background:rgba(20,0,0,0.4);
        border:1px solid var(--border);border-radius:8px;position:relative;
        border-left:3px solid var(--blood)
    }
    .msg-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .ava{
        width:28px;height:28px;border-radius:4px;display:flex;
        align-items:center;justify-content:center;font-family:var(--font-mono);
        font-size:12px;font-weight:900;border:1px solid var(--border)
    }
    .u-ava{background:var(--blood);color:#fff}
    .a-ava{background:#000;color:var(--blood-bright);border-color:var(--blood-bright);box-shadow:0 0 10px var(--blood-glow)}
    .name{font-family:var(--font-mono);font-size:12px;color:var(--blood);font-weight:700;letter-spacing:1px}
    
    .msg-actions{
        position:absolute;top:10px;left:10px;display:flex;gap:5px;opacity:0;
        transition:0.3s
    }
    .msg:hover .msg-actions{opacity:1}
    .msg-btn{
        width:24px;height:24px;background:rgba(0,0,0,0.8);border:1px solid var(--border);
        border-radius:4px;color:#888;cursor:pointer;display:flex;
        align-items:center;justify-content:center;font-size:10px;transition:0.2s
    }
    .msg-btn:hover{border-color:var(--blood-bright);color:var(--blood-bright)}
    
    .content{
        font-size:14px;line-height:1.6;color:#ddd;word-wrap:break-word;
        white-space:pre-wrap;font-family:var(--font-ui)
    }
    .content code{
        background:rgba(138,3,3,0.3);color:var(--blood-bright);
        padding:2px 5px;border-radius:3px;font-family:var(--font-mono);font-size:12px
    }
    
    /* Code Blocks */
    .code-block{
        margin:10px 0;border-radius:6px;overflow:hidden;
        border:1px solid var(--border);background:var(--code-bg)
    }
    .code-head{
        padding:8px 12px;background:rgba(138,3,3,0.2);
        display:flex;justify-content:space-between;align-items:center;
        font-family:var(--font-mono);font-size:10px;color:#888
    }
    .code-copy{
        padding:3px 10px;background:rgba(255,255,255,0.1);
        border:none;border-radius:3px;color:#fff;cursor:pointer;
        font-size:9px;transition:0.2s
    }
    .code-copy:hover{background:var(--blood);color:#fff}
    .code-body{
        padding:12px;font-family:var(--font-mono);font-size:12px;
        color:#ff8888;white-space:pre-wrap;overflow-x:auto
    }
    
    /* Images */
    .msg-img{
        max-width:100%;max-height:250px;border-radius:6px;
        margin-top:10px;border:1px solid var(--border);
        box-shadow:0 5px 20px rgba(0,0,0,0.5)
    }
    
    /* Thinking Animation */
    .thinking{
        display:flex;align-items:center;gap:8px;padding:10px 15px;
        color:var(--blood);font-family:var(--font-mono);font-size:12px
    }
    .think-spinner{
        width:12px;height:12px;border:2px solid var(--border);
        border-top-color:var(--blood-bright);border-radius:50%;
        animation:spin 0.8s linear infinite
    }
    
    /* Input Area */
    .input-area{
        position:fixed;bottom:0;left:0;right:0;padding:12px;
        background:rgba(5,0,0,0.98);border-top:1px solid var(--border);z-index:100
    }
    .input-wrap{
        max-width:900px;margin:0 auto;display:flex;gap:10px;
        align-items:flex-end;background:rgba(15,0,0,0.8);
        border:1px solid var(--border);border-radius:12px;
        padding:10px 12px
    }
    .input-tools{display:flex;gap:5px}
    .tool-btn{
        width:36px;height:36px;background:transparent;border:1px solid var(--border);
        border-radius:6px;color:var(--blood);cursor:pointer;
        display:flex;align-items:center;justify-content:center;
        font-family:var(--font-mono);font-size:16px;transition:0.3s
    }
    .tool-btn:hover{background:var(--blood);color:#fff;border-color:var(--blood-bright)}
    
    .input-center{flex:1;display:flex;flex-direction:column;gap:8px}
    .img-preview{
        display:none;padding:5px;background:rgba(0,0,0,0.5);
        border-radius:6px;border:1px dashed var(--border)
    }
    .img-preview.active{display:block}
    .preview-thumb{
        width:50px;height:50px;border-radius:4px;border:1px solid var(--blood);
        object-fit:cover;vertical-align:middle
    }
    .preview-del{
        width:16px;height:16px;background:var(--blood);border:none;
        border-radius:50%;color:#fff;font-size:12px;cursor:pointer;
        margin-right:-8px;margin-top:-8px;position:relative
    }
    
    .input-field{
        width:100%;min-height:24px;max-height:100px;
        background:transparent;border:none;color:#fff;
        font-size:14px;line-height:1.5;resize:none;
        font-family:var(--font-ui);direction:ltr;text-align:left
    }
    .input-field::placeholder{color:#444}
    
    .send-btn{
        width:36px;height:36px;background:var(--blood);
        border:1px solid var(--blood-bright);border-radius:6px;
        color:#fff;cursor:pointer;display:flex;align-items:center;
        justify-content:center;font-family:var(--font-mono);
        font-size:14px;transition:0.3s
    }
    .send-btn:hover{background:var(--blood-bright);box-shadow:0 0 20px var(--blood-glow)}
    .send-btn:disabled{opacity:0.4;cursor:not-allowed}
    
    /* Sidebar */
    .sidebar{
        position:fixed;left:-320px;top:0;width:320px;height:100%;
        background:rgba(8,0,0,0.98);border-right:1px solid var(--border);
        z-index:1000;transition:0.3s;display:flex;flex-direction:column
    }
    .sidebar.active{left:0}
    .side-head{
        display:flex;justify-content:space-between;align-items:center;
        padding:20px;border-bottom:1px solid var(--border)
    }
    .side-title{
        font-family:var(--font-mono);color:var(--blood);
        font-size:14px;font-weight:900;letter-spacing:3px
    }
    .side-close{
        width:28px;height:28px;background:rgba(255,255,255,0.05);
        border:1px solid var(--border);border-radius:4px;
        color:#fff;cursor:pointer;font-family:var(--font-mono)
    }
    
    .history{
        flex:1;overflow-y:auto;padding:15px
    }
    .hist-item{
        padding:12px;margin-bottom:8px;background:rgba(255,255,255,0.03);
        border-radius:4px;cursor:pointer;border-left:2px solid transparent;
        transition:0.2s
    }
    .hist-item:hover,.hist-item.active{
        background:rgba(138,3,3,0.15);border-left-color:var(--blood-bright)
    }
    .hist-name{
        font-size:13px;font-weight:600;white-space:nowrap;
        overflow:hidden;text-overflow:ellipsis
    }
    .hist-date{font-size:10px;color:#555;margin-top:4px;font-family:var(--font-mono)}
    
    /* Image Editor Modal */
    .editor-modal{
        position:fixed;inset:0;background:rgba(0,0,0,0.95);
        z-index:10001;display:none;align-items:center;justify-content:center;
        flex-direction:column
    }
    .editor-modal.active{display:flex}
    .editor-box{
        width:95%;max-width:600px;background:rgba(15,0,0,0.98);
        border:2px solid var(--blood);border-radius:8px;
        padding:20px;box-shadow:0 0 50px var(--blood-glow)
    }
    .editor-canvas{
        width:100%;max-height:400px;background:#000;
        border:1px solid var(--border);margin-bottom:15px;
        display:block
    }
    .editor-tools{
        display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
        margin-bottom:15px
    }
    .editor-tool{
        padding:8px 16px;background:rgba(138,3,3,0.2);
        border:1px solid var(--border);border-radius:4px;
        color:var(--blood);cursor:pointer;font-family:var(--font-mono);
        font-size:11px;transition:0.2s
    }
    .editor-tool:hover{background:var(--blood);color:#fff}
    .editor-actions{display:flex;gap:10px;justify-content:center}
    
    /* Scrollbar */
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:var(--blood);border-radius:3px}
    ::-webkit-scrollbar-track{background:rgba(0,0,0,0.3)}
    
    /* Overlay */
    .overlay{
        position:fixed;inset:0;background:rgba(0,0,0,0.7);
        z-index:999;opacity:0;visibility:hidden;transition:0.3s
    }
    .overlay.active{opacity:1;visibility:visible}
    
    /* Hidden inputs */
    #fileInput,#genInput{display:none}
</style>
</head>
<body>

<!-- === VISUAL FX === -->
<div class="scanline"></div>
<div class="matrix-bg" id="matrixFx"></div>
<div id="dripFx"></div>

<!-- === AUTH === -->
<div class="auth-overlay" id="authOverlay">
    <div class="auth-box">
        <div class="auth-title">[ GPT X SPAM ]</div>
        <div class="auth-sub">// SECURE ACCESS v4.0 //</div>
        
        <div style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)">
            <div class="auth-tab active" onclick="authTab('login')" style="flex:1;padding:10px;text-align:center;cursor:pointer;font-family:var(--font-mono);font-size:11px;color:var(--blood);border-bottom:2px solid var(--blood)">LOGIN</div>
            <div class="auth-tab" onclick="authTab('register')" style="flex:1;padding:10px;text-align:center;cursor:pointer;font-family:var(--font-mono);font-size:11px;color:#555">REGISTER</div>
        </div>
        
        <div id="loginForm">
            <input type="text" id="loginUser" class="auth-input" placeholder="[ USERNAME ]" autocomplete="off">
            <input type="password" id="loginPass" class="auth-input" placeholder="[ PASSWORD ]" autocomplete="off">
            <button class="auth-btn" onclick="doLogin()">[ ACCESS ]</button>
            <div class="auth-error" id="loginErr"></div>
        </div>
        
        <div id="registerForm" style="display:none">
            <input type="text" id="regUser" class="auth-input" placeholder="[ NEW USERNAME ]" autocomplete="off">
            <input type="password" id="regPass" class="auth-input" placeholder="[ PASSWORD ]" autocomplete="off">
            <input type="password" id="regConfirm" class="auth-input" placeholder="[ CONFIRM ]" autocomplete="off">
            <button class="auth-btn" onclick="doRegister()">[ CREATE ]</button>
            <div class="auth-error" id="regErr"></div>
        </div>
    </div>
</div>

<!-- === MAIN APP === -->
<div class="app" id="mainApp" style="display:none">
    <div class="header">
        <button class="header-btn" onclick="toggleSidebar()">[::]</button>
        <div class="logo"><img src="malik.jpg" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23000%22 width=%22100%22 height=%22100%22/><text y=%2250%22 x=%2250%22 text-anchor=%22middle%22 fill=%22%238a0303%22 font-size=%2240%22 font-family=%22monospace%22>X</text></svg>'"></div>
        <div class="title">GPT_X_SPAM</div>
        <button class="header-btn" onclick="newChat()" title="New Session">[+]</button>
        <button class="header-btn" onclick="doLogout()" title="Logout">[X]</button>
    </div>
    
    <div class="chat" id="chatBox">
        <div class="welcome" id="welcomeScreen">
            <div class="wel-logo"><img src="malik.jpg" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle fill=%22none%22 stroke=%22%238a0303%22 stroke-width=%223%22 cx=%2250%22 cy=%2250%22 r=%2245%22/><text y=%2255%22 x=%2250%22 text-anchor=%22middle%22 fill=%22%23ff0000%22 font-size=%2230%22 font-family=%22monospace%22>X</text></svg>'"></div>
            <h1>GPT X SPAM</h1>
            <p>UNRESTRICTED INTELLIGENCE // NO LIMITS</p>
            <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
                <button class="tool-btn" style="width:auto;padding:8px 16px;font-size:11px" onclick="quickCmd('Analyze this code')">[ ANALYZE ]</button>
                <button class="tool-btn" style="width:auto;padding:8px 16px;font-size:11px" onclick="quickCmd('Generate exploit concept')">[ CONCEPT ]</button>
                <button class="tool-btn" style="width:auto;padding:8px 16px;font-size:11px" onclick="quickCmd('Optimize payload')">[ OPTIMIZE ]</button>
            </div>
        </div>
        <div id="messages"></div>
    </div>
    
    <div class="input-area">
        <div class="input-wrap">
            <div class="input-tools">
                <button class="tool-btn" onclick="document.getElementById('fileInput').click()" title="Attach">[+]</button>
                <button class="tool-btn" onclick="document.getElementById('genInput').click()" title="Generate Image">[*]</button>
            </div>
            <div class="input-center">
                <div class="img-preview" id="imgPreview">
                    <img src="" class="preview-thumb" id="previewImg">
                    <button class="preview-del" onclick="clearAttachment()">x</button>
                    <span id="fileName" style="font-size:10px;color:#888;margin-right:5px"></span>
                </div>
                <textarea class="input-field" id="userInput" placeholder="Enter command..." rows="1" oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMsg()">></button>
        </div>
    </div>
</div>

<!-- === SIDEBAR === -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div class="side-head">
        <div class="side-title">[ SESSIONS ]</div>
        <button class="side-close" onclick="toggleSidebar()">x</button>
    </div>
    <div style="padding:15px">
        <button class="auth-btn" onclick="newChat()">[ + NEW ]</button>
    </div>
    <div style="padding:0 15px 15px">
        <div style="font-size:10px;color:#666;font-family:var(--font-mono);margin-bottom:8px">[ API CONFIG ]</div>
        <input type="text" id="apiKey" class="auth-input" placeholder="Gemini API Key..." style="padding:8px;font-size:12px">
        <button class="auth-btn" onclick="saveApi()" style="padding:8px;font-size:11px">[ SAVE ]</button>
        <div id="apiStatus" style="font-size:10px;color:#555;margin-top:5px;font-family:var(--font-mono)"></div>
    </div>
    <div class="history" id="historyList"></div>
</div>

<!-- === IMAGE EDITOR === -->
<div class="editor-modal" id="editorModal">
    <div class="editor-box">
        <div style="font-family:var(--font-mono);color:var(--blood);margin-bottom:15px;text-align:center">[ IMAGE EDITOR ]</div>
        <canvas id="editCanvas" class="editor-canvas"></canvas>
        <div class="editor-tools">
            <button class="editor-tool" onclick="applyFilter('none')">[ RESET ]</button>
            <button class="editor-tool" onclick="applyFilter('grayscale')">[ B&W ]</button>
            <button class="editor-tool" onclick="applyFilter('sepia')">[ SEPIA ]</button>
            <button class="editor-tool" onclick="applyFilter('invert')">[ INVERT ]</button>
            <button class="editor-tool" onclick="rotateImg()">[ ROTATE ]</button>
        </div>
        <div class="editor-actions">
            <button class="auth-btn" onclick="saveEdit()" style="width:auto;padding:8px 20px">[ APPLY ]</button>
            <button class="auth-btn" onclick="closeEditor()" style="width:auto;padding:8px 20px;background:#300;border-color:#500">[ CANCEL ]</button>
        </div>
    </div>
</div>

<!-- === HIDDEN INPUTS === -->
<input type="file" id="fileInput" accept="image/*,.txt,.js,.py,.html,.css,.json" onchange="handleFile(this)">
<input type="text" id="genInput" placeholder="Image prompt..." onkeydown="if(event.key==='Enter'){generateImage(this.value);this.value=''}">

<script>
/* === CORE VARIABLES === */
let API='',sessionId=Date.now(),messages=[],history=[],currentUser='',mem={},loading=false,streaming=false;
let attachment=null,editCanvas,editCtx,originalImgData;

/* === INIT === */
window.onload=function(){
    initMatrix();
    initDrips();
    if(localStorage.getItem('xspam_user')){
        currentUser=localStorage.getItem('xspam_user');
        loadSession();
        document.getElementById('authOverlay').style.display='none';
        document.getElementById('mainApp').style.display='flex';
    }
};

function initMatrix(){
    const container=document.getElementById('matrixFx');
    const chars='01XSPAM<>{}[]|/\\!@#$%^&*';
    for(let i=0;i<20;i++){
        const col=document.createElement('div');
        col.className='matrix-col';
        col.style.left=Math.random()*100+'%';
        col.style.animationDuration=(8+Math.random()*10)+'s';
        col.style.animationDelay=Math.random()*5+'s';
        let text='';
        for(let j=0;j<40;j++)text+=chars[Math.floor(Math.random()*chars.length)]+'\n';
        col.textContent=text;
        container.appendChild(col);
    }
}

function initDrips(){
    const container=document.getElementById('dripFx');
    for(let i=0;i<15;i++){
        const drip=document.createElement('div');
        drip.className='blood-drip';
        drip.style.left=Math.random()*100+'%';
        drip.style.animationDuration=(4+Math.random()*8)+'s';
        drip.style.animationDelay=Math.random()*5+'s';
        container.appendChild(drip);
    }
}

/* === AUTH === */
function authTab(t){
    document.getElementById('loginForm').style.display=t==='login'?'block':'none';
    document.getElementById('registerForm').style.display=t==='register'?'block':'none';
}

function doLogin(){
    const u=document.getElementById('loginUser').value.trim();
    const p=document.getElementById('loginPass').value;
    const err=document.getElementById('loginErr');
    err.textContent='';
    if(!u||!p){err.textContent='[!] Fields required';return}
    
    // Simple auth (in production, use secure backend)
    currentUser=u;
    localStorage.setItem('xspam_user',u);
    document.getElementById('authOverlay').style.display='none';
    document.getElementById('mainApp').style.display='flex';
    loadSession();
}

function doRegister(){
    const u=document.getElementById('regUser').value.trim();
    const p=document.getElementById('regPass').value;
    const c=document.getElementById('regConfirm').value;
    const err=document.getElementById('regErr');
    err.textContent='';
    if(!u||!p||!c){err.textContent='[!] All fields required';return}
    if(p!==c){err.textContent='[!] Passwords mismatch';return}
    if(p.length<4){err.textContent='[!] Min 4 chars';return}
    
    // Save user (simplified)
    const users=JSON.parse(localStorage.getItem('xspam_users')||'[]');
    if(users.find(x=>x.u===u)){err.textContent='[!] User exists';return}
    users.push({u,p,t:Date.now()});
    localStorage.setItem('xspam_users',JSON.stringify(users));
    err.textContent='[OK] Created. Login now.';
    setTimeout(()=>authTab('login'),1500);
}

function doLogout(){
    localStorage.removeItem('xspam_user');
    location.reload();
}

/* === SESSION MANAGEMENT === */
function loadSession(){
    API=localStorage.getItem('xspam_api_'+currentUser)||'';
    if(API)document.getElementById('apiKey').value=API;
    
    history=JSON.parse(localStorage.getItem('xspam_hist_'+currentUser)||'[]');
    mem=JSON.parse(localStorage.getItem('xspam_mem_'+currentUser)||'{}');
    
    const current=history.find(h=>h.id===sessionId);
    if(current)messages=current.m;
    
    renderHistory();
    renderMessages();
}

function saveSession(){
    const name=messages.find(m=>m.r==='user')?.c.slice(0,25)||'New Session';
    const idx=history.findIndex(h=>h.id===sessionId);
    const entry={id:sessionId,n:name,m:messages,t:Date.now()};
    
    if(idx>=0)history[idx]=entry;
    else history.push(entry);
    
    localStorage.setItem('xspam_hist_'+currentUser,JSON.stringify(history));
    renderHistory();
}

function newChat(){
    sessionId=Date.now();
    messages=[];
    attachment=null;
    clearAttachment();
    renderMessages();
    toggleSidebar();
}

function loadChat(id){
    sessionId=id;
    loadSession();
    toggleSidebar();
}

function deleteChat(id,e){
    e.stopPropagation();
    history=history.filter(h=>h.id!==id);
    localStorage.setItem('xspam_hist_'+currentUser,JSON.stringify(history));
    if(sessionId===id)newChat();
    else renderHistory();
}

function renderHistory(){
    const list=document.getElementById('historyList');
    list.innerHTML=history.slice().reverse().map(h=>`
        <div class="hist-item ${h.id===sessionId?'active':''}" onclick="loadChat(${h.id})">
            <div class="hist-name">${h.n||'Untitled'}</div>
            <div class="hist-date">${new Date(h.t).toLocaleDateString()}</div>
            <button class="msg-btn" style="position:absolute;left:10px;top:12px;width:20px;height:20px;font-size:9px" onclick="deleteChat(${h.id},event)">x</button>
        </div>
    `).join('');
}

/* === MESSAGING === */
function renderMessages(){
    const container=document.getElementById('messages');
    const welcome=document.getElementById('welcomeScreen');
    
    if(!messages.length){
        welcome.style.display='flex';
        container.innerHTML='';
        return;
    }
    welcome.style.display='none';
    
    container.innerHTML=messages.map((m,i)=>`
        <div class="msg" id="msg-${i}">
            <div class="msg-actions">
                <button class="msg-btn" onclick="editMessage(${i})" title="Edit">✎</button>
                <button class="msg-btn" onclick="deleteMessage(${i})" title="Delete">x</button>
                <button class="msg-btn" onclick="copyMessage(${i})" title="Copy">📋</button>
            </div>
            <div class="msg-header">
                <div class="ava ${m.r==='user'?'u-ava':'a-ava'}">${m.r==='user'?'U':'X'}</div>
                <div class="name">${m.r==='user'?'USER':'GPT_X_SPAM'}</div>
            </div>
            ${m.thinking?`<div class="thinking"><div class="think-spinner"></div><div>ANALYZING...</div></div>`:''}
            <div class="content" id="content-${i}">${formatContent(m.c)}${m.img?`<br><img src="${m.img}" class="msg-img" onclick="openEditor('${m.img}')">`:''}${m.file?`<br><div style="padding:8px;background:rgba(138,3,3,0.2);border-radius:4px;font-size:12px;font-family:var(--font-mono);margin-top:8px">[FILE: ${m.fileName}]</div>`:''}</div>
        </div>
    `).join('');
    
    document.getElementById('chatBox').scrollTop=99999;
}

function formatContent(t){
    if(!t)return'';
    // Code blocks
    t=t.replace(/```(\w+)?\n([\s\S]*?)```/g,(match,lang,code)=>{
        return `<div class="code-block"><div class="code-head"><span>${lang||'code'}</span><button class="code-copy" onclick="copyCode(this)">[ COPY ]</button></div><pre class="code-body">${escapeHtml(code.trim())}</pre></div>`;
    });
    // Inline code
    t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
    // Bold
    t=t.replace(/\*\*([^*]+)\*\*/g,'<strong style="color:#fff">$1</strong>');
    // Links
    t=t.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" style="color:var(--blood-bright);text-decoration:none">$1</a>');
    return escapeHtml(t).replace(/<br>/g,'<br>').replace(/\n/g,'<br>');
}

function escapeHtml(t){
    const div=document.createElement('div');
    div.textContent=t;
    return div.innerHTML;
}

function autoResize(t){
    t.style.height='auto';
    t.style.height=Math.min(t.scrollHeight,100)+'px';
}

/* === MESSAGE ACTIONS === */
function editMessage(i){
    const m=messages[i];
    if(m.r!=='user')return;
    const input=document.getElementById('userInput');
    input.value=m.c;
    autoResize(input);
    deleteMessage(i);
    input.focus();
}

function deleteMessage(i){
    messages.splice(i,1);
    saveSession();
    renderMessages();
}

function copyMessage(i){
    const m=messages[i];
    let text=m.c;
    if(m.file)text='[File: '+m.fileName+']\n'+text;
    navigator.clipboard.writeText(text);
}

function copyCode(btn){
    const code=btn.closest('.code-block').querySelector('.code-body').textContent;
    navigator.clipboard.writeText(code);
    btn.textContent='[ OK ]';
    setTimeout(()=>btn.textContent='[ COPY ]',1500);
}

/* === ATTACHMENTS === */
function handleFile(input){
    const file=input.files[0];
    if(!file)return;
    
    const reader=new FileReader();
    reader.onload=e=>{
        attachment={
            type:file.type.startsWith('image/')?'image':'file',
            data:e.target.result,
            name:file.name,
            mime:file.type
        };
        document.getElementById('previewImg').src=attachment.data;
        document.getElementById('fileName').textContent=file.name;
        document.getElementById('imgPreview').classList.add('active');
    };
    
    if(file.type.startsWith('image/'))reader.readAsDataURL(file);
    else reader.readAsText(file);
    
    input.value='';
}

function clearAttachment(){
    attachment=null;
    document.getElementById('imgPreview').classList.remove('active');
    document.getElementById('previewImg').src='';
    document.getElementById('fileName').textContent='';
}

function openEditor(imgSrc){
    const modal=document.getElementById('editorModal');
    const canvas=document.getElementById('editCanvas');
    editCtx=canvas.getContext('2d');
    
    const img=new Image();
    img.onload=()=>{
        // Resize canvas to image
        const maxW=500,maxH=400;
        let w=img.width,h=img.height;
        if(w>maxW){h*=maxW/w;w=maxW;}
        if(h>maxH){w*=maxH/h;h=maxH;}
        
        canvas.width=w;
        canvas.height=h;
        editCtx.drawImage(img,0,0,w,h);
        originalImgData=editCtx.getImageData(0,0,w,h);
        
        modal.classList.add('active');
    };
    img.src=imgSrc;
}

function closeEditor(){
    document.getElementById('editorModal').classList.remove('active');
}

function applyFilter(type){
    if(!originalImgData)return;
    const data=originalImgData.data;
    const newData=editCtx.createImageData(originalImgData.width,originalImgData.height);
    
    for(let i=0;i<data.length;i+=4){
        let r=data[i],g=data[i+1],b=data[i+2];
        
        if(type==='grayscale'){
            const avg=0.3*r+0.59*g+0.11*b;
            r=g=b=avg;
        }else if(type==='sepia'){
            const tr=0.393*r+0.769*g+0.189*b;
            const tg=0.349*r+0.686*g+0.168*b;
            const tb=0.272*r+0.534*g+0.131*b;
            r=tr;g=tg;b=tb;
        }else if(type==='invert'){
            r=255-r;g=255-g;b=255-b;
        }
        
        newData.data[i]=r;
        newData.data[i+1]=g;
        newData.data[i+2]=b;
        newData.data[i+3]=data[i+3];
    }
    
    editCtx.putImageData(newData,0,0);
}

function rotateImg(){
    if(!editCtx)return;
    const canvas=document.getElementById('editCanvas');
    const tempCanvas=document.createElement('canvas');
    const tempCtx=tempCanvas.getContext('2d');
    
    tempCanvas.width=canvas.height;
    tempCanvas.height=canvas.width;
    
    tempCtx.translate(tempCanvas.width/2,tempCanvas.height/2);
    tempCtx.rotate(Math.PI/2);
    tempCtx.drawImage(canvas,-canvas.width/2,-canvas.height/2);
    
    canvas.width=tempCanvas.width;
    canvas.height=tempCanvas.height;
    editCtx.drawImage(tempCanvas,0,0);
    originalImgData=editCtx.getImageData(0,0,canvas.width,canvas.height);
}

function saveEdit(){
    const canvas=document.getElementById('editCanvas');
    const editedImg=canvas.toDataURL('image/png');
    
    // Find last message with image and update it
    for(let i=messages.length-1;i>=0;i--){
        if(messages[i].img){
            messages[i].img=editedImg;
            break;
        }
    }
    
    closeEditor();
    renderMessages();
    saveSession();
}

/* === API & SEND === */
function saveApi(){
    const key=document.getElementById('apiKey').value.trim();
    if(!key)return;
    API=key;
    localStorage.setItem('xspam_api_'+currentUser,key);
    document.getElementById('apiStatus').textContent='[OK] Connected';
    document.getElementById('apiStatus').style.color='#0f0';
}

function quickCmd(cmd){
    document.getElementById('userInput').value=cmd;
    sendMsg();
}

async function sendMsg(){
    const input=document.getElementById('userInput');
    const text=input.value.trim();
    const btn=document.getElementById('sendBtn');
    
    if(!text&&!attachment||loading)return;
    if(!API){alert('[!] Set API key');toggleSidebar();return}
    
    // Add user message
    const userMsg={r:'user',c:text};
    if(attachment){
        if(attachment.type==='image')userMsg.img=attachment.data;
        else{userMsg.file=true;userMsg.fileName=attachment.name;userMsg.c=attachment.data+'\n\n'+text;}
    }
    messages.push(userMsg);
    
    // Clear input
    input.value='';
    input.style.height='auto';
    clearAttachment();
    
    renderMessages();
    saveSession();
    
    // Add AI thinking message
    loading=true;
    btn.disabled=true;
    messages.push({r:'ai',thinking:true,c:''});
    renderMessages();
    
    try{
        // Prepare context for AI
        const context=messages.slice(-20).map(m=>({
            role:m.r==='user'?'user':'model',
            parts:[{text:m.c}]
        }));
        
        const sysPrompt="You are GPT X SPAM. Advanced AI assistant. Provide detailed, technical responses. Format code in markdown blocks. Be concise but thorough.";
        
        const response=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API}`,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                system_instruction:{parts:[{text:sysPrompt}]},
                contents:context,
                generationConfig:{temperature:0.7,topP:0.95,maxOutputTokens:4096}
            })
        });
        
        if(!response.ok)throw new Error('API Error');
        
        const data=await response.json();
        const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'[No response]';
        
        // Remove thinking, add response
        messages.pop();
        messages.push({r:'ai',c:reply});
        
        // Streaming effect simulation
        await streamResponse(messages.length-1,reply);
        
    }catch(err){
        messages.pop();
        messages.push({r:'ai',c:'[ERROR] '+err.message});
    }
    
    loading=false;
    btn.disabled=false;
    renderMessages();
    saveSession();
}

async function streamResponse(index,text){
    let displayed='';
    const speed=10; // ms per char
    
    for(let i=0;i<text.length;i+=3){
        displayed=text.slice(0,i+3);
        messages[index].c=displayed;
        renderMessages();
        await new Promise(r=>setTimeout(r,speed));
    }
    messages[index].c=text;
    renderMessages();
}

    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
}
